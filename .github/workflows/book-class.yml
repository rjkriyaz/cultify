name: Auto Book Cult Class

on:
  schedule:
    - cron: '30 16 * * *'  # 10:00 PM IST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  book-class:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run booking script
        env:
          CURL_COMMAND: ${{ secrets.CURL_COMMAND }}
          PREFERRED_CENTER: ${{ secrets.PREFERRED_CENTER }}
          PREFERRED_SLOTS: ${{ secrets.PREFERRED_SLOTS }}
          PREFERRED_WORKOUT: ${{ secrets.PREFERRED_WORKOUT }}
          ENABLE_WAITLIST: ${{ secrets.ENABLE_WAITLIST }}
        run: bun index.js
